name: CD

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Deployment environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

jobs:
  build-package:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate and test
        run: |
          python -m py_compile hegel_engine.py knowledge_base.py app_streamlit.py hegel_dialogue_machine.py retrieval.py telemetry.py retrieval_eval.py env_bootstrap.py quality_schema.py quality_metrics.py quality_retriever.py quality_reranker.py quality_cache.py quality_llm.py quality_pipeline.py quality_gate.py fastapi_app.py
          pytest -q

      - name: Package artifact
        run: |
          mkdir -p dist
          zip -r dist/hegel-logic-${{ github.sha }}.zip . \
            -x ".git/*" ".cursor/*" "library/*" "data/*" "__pycache__/*" ".pytest_cache/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hegel-logic-${{ github.event.inputs.target_env }}
          path: dist/*.zip

